<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Voice AI - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.1)" fill-opacity="1" d="M0,96L48,112C96,128,192,160,288,176C384,192,480,192,576,176C672,160,768,128,864,122.7C960,117,1056,139,1152,144C1248,149,1344,139,1392,133.3L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') no-repeat bottom;
            background-size: cover;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            max-width: 1200px;
            width: 100%;
            position: relative;
            z-index: 1;
            align-items: center;
        }

        .left-side {
            text-align: center;
            color: white;
            opacity: 0.95;
        }

        .left-side h1 {
            font-size: 3.5em;
            margin-bottom: 20px;
            font-weight: 800;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .left-side p {
            font-size: 1.15em;
            line-height: 1.8;
            letter-spacing: 1px;
            font-style: italic;
        }

        .right-side {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 25px;
            padding: 50px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .form-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .form-header h2 {
            color: #667eea;
            font-size: 2.2em;
            margin-bottom: 8px;
        }

        .form-header p {
            color: #999;
            font-size: 1em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #667eea;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 16px;
            border: 2px solid #ecf0f1;
            border-radius: 12px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: #f9f9ff;
        }

        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: white;
        }

        .password-suggestion {
            background: #f0f4ff;
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 12px;
            margin-top: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            color: #667eea;
            font-weight: 600;
            font-size: 0.9em;
            display: none;
        }

        .password-suggestion:hover {
            background: #e8f0ff;
            transform: translateY(-2px);
        }

        .password-suggestion.show {
            display: block;
        }

        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.05em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.5);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .form-footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .form-footer a:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-weight: 600;
            animation: slideIn 0.3s ease;
        }

        .message.error {
            background: linear-gradient(135deg, #fadbd8 0%, #f5b7b1 100%);
            color: #c0392b;
            border-left: 4px solid #e74c3c;
        }

        .message.success {
            background: linear-gradient(135deg, #d5f4e6 0%, #a9dfbf 100%);
            color: #186a3b;
            border-left: 4px solid #27ae60;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .left-side {
                display: none;
            }

            .left-side h1 {
                font-size: 2.5em;
            }

            .right-side {
                padding: 30px;
            }

            .form-header h2 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-side">
            <h1>🎙️ Smart Voice AI</h1>
            <p>Your Intelligent Voice Assistant - Ask Anything, Get Instant Answers</p>
        </div>

        <div class="right-side">
            <div id="formContainer">
                <!-- LOGIN FORM -->
                <div id="loginForm" class="form-section">
                    <div class="form-header">
                        <h2>Login</h2>
                        <p>Welcome back to your AI assistant</p>
                    </div>

                    <div id="messageContainer"></div>

                    <form onsubmit="handleLogin(event)">
                        <div class="form-group">
                            <label for="loginEmail">Email</label>
                            <input 
                                type="email" 
                                id="loginEmail" 
                                placeholder="your@email.com" 
                                required
                                onchange="checkPasswordSuggestion()"
                            />
                        </div>

                        <div class="form-group">
                            <label for="loginPassword">Password</label>
                            <input 
                                type="password" 
                                id="loginPassword" 
                                placeholder="Enter your password" 
                                required
                            />
                            <div id="passwordSuggestion" class="password-suggestion">
                                💡 Suggested Password (click to use)
                            </div>
                        </div>

                        <button type="submit" id="loginBtn">Login</button>
                    </form>

                    <div class="form-footer">
                        Don't have an account? <a onclick="switchToSignup()">Sign Up</a>
                    </div>
                </div>

                <!-- SIGNUP FORM -->
                <div id="signupForm" class="form-section" style="display: none;">
                    <div class="form-header">
                        <h2>Sign Up</h2>
                        <p>Create your Smart Voice AI account</p>
                    </div>

                    <div id="signupMessageContainer"></div>

                    <form onsubmit="handleSignup(event)">
                        <div class="form-group">
                            <label for="signupName">Full Name</label>
                            <input 
                                type="text" 
                                id="signupName" 
                                placeholder="Your full name" 
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="signupEmail">Email</label>
                            <input 
                                type="email" 
                                id="signupEmail" 
                                placeholder="your@email.com" 
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="signupPassword">Password</label>
                            <input 
                                type="password" 
                                id="signupPassword" 
                                placeholder="Create a strong password" 
                                required
                            />
                        </div>

                        <div class="form-group">
                            <label for="signupConfirm">Confirm Password</label>
                            <input 
                                type="password" 
                                id="signupConfirm" 
                                placeholder="Confirm your password" 
                                required
                            />
                        </div>

                        <button type="submit" id="signupBtn">Create Account</button>
                    </form>

                    <div class="form-footer">
                        Already have an account? <a onclick="switchToLogin()">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let suggestedPassword = null;

        function switchToSignup() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.getElementById('messageContainer').textContent = '';
            document.getElementById('signupMessageContainer').textContent = '';
        }

        function switchToLogin() {
            document.getElementById('signupForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('messageContainer').textContent = '';
            document.getElementById('signupMessageContainer').textContent = '';
        }

        function showMessage(container, message, type) {
            const msgDiv = document.getElementById(container);
            msgDiv.innerHTML = `<div class="message ${type}">${message}</div>`;
            setTimeout(() => msgDiv.innerHTML = '', 5000);
        }

        async function checkPasswordSuggestion() {
            const email = document.getElementById('loginEmail').value;
            if (!email) return;

            try {
                const response = await fetch('/api/get-password-suggestion', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                const suggestionDiv = document.getElementById('passwordSuggestion');

                if (data.found && data.password) {
                    suggestedPassword = data.password;
                    suggestionDiv.classList.add('show');
                    suggestionDiv.onclick = () => {
                        document.getElementById('loginPassword').value = suggestedPassword;
                        suggestionDiv.classList.remove('show');
                    };
                } else {
                    suggestionDiv.classList.remove('show');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function handleLogin(event) {
            event.preventDefault();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loading"></span> Logging in...';

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('messageContainer', '✅ Login successful! Redirecting...', 'success');
                    localStorage.setItem('username', data.username);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showMessage('messageContainer', '❌ ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('messageContainer', '❌ Login failed. Please try again.', 'error');
                console.error('Error:', error);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Login';
            }
        }

        async function handleSignup(event) {
            event.preventDefault();

            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const confirm = document.getElementById('signupConfirm').value;

            if (password !== confirm) {
                showMessage('signupMessageContainer', '❌ Passwords do not match!', 'error');
                return;
            }

            const signupBtn = document.getElementById('signupBtn');
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="loading"></span> Creating account...';

            try {
                const response = await fetch('/api/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showMessage('signupMessageContainer', '✅ Account created! Redirecting to login...', 'success');
                    setTimeout(() => {
                        switchToLogin();
                        document.getElementById('loginEmail').value = email;
                        document.getElementById('loginPassword').value = '';
                        checkPasswordSuggestion();
                    }, 1500);
                } else {
                    showMessage('signupMessageContainer', '❌ ' + data.message, 'error');
                }
            } catch (error) {
                showMessage('signupMessageContainer', '❌ Signup failed. Please try again.', 'error');
                console.error('Error:', error);
            } finally {
                signupBtn.disabled = false;
                signupBtn.innerHTML = 'Create Account';
            }
        }
    </script>
</body>
</html>
